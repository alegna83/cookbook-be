services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker.local
    ports:
      - '3000:3000'
    depends_on:
      - db
    command: sh -c "if [ \"$$RUN_MIGRATIONS_ON_START\" = \"true\" ]; then npm run migration:run:prod; fi && npm run start:prod"

  frontend:
    build:
      context: ../camino_places_app
    restart: unless-stopped
    env_file:
      - .env.docker.local
    ports:
      - '8000:80'
    depends_on:
      - backend

volumes:
  db_data:
